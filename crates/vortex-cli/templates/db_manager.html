<!DOCTYPE html>
<html lang="en" data-theme="remicle">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Manager - Vortex</title>
    <link href="/static/vendor/daisyui.min.css" rel="stylesheet">
    <link href="/static/vortex.css?v=4" rel="stylesheet">
    <script src="/static/vortex.js?v=4" defer></script>
    <script src="/static/vendor/tailwind.js"></script>
    <script src="/static/vendor/htmx.min.js"></script>
    <style>
        [data-theme="remicle"] {
            --p: 93 54% 51%; --pf: 93 45% 42%; --pc: 0 0% 100%;
            --s: 210 11% 45%; --sf: 210 11% 35%; --sc: 0 0% 100%;
            --n: 220 13% 26%; --nf: 220 13% 18%; --nc: 210 20% 98%;
            --b1: 0 0% 100%; --b2: 210 20% 98%; --b3: 214 14% 94%;
            --bc: 220 13% 26%;
            --er: 0 72% 51%; --erc: 0 0% 100%;
            --su: 158 64% 42%; --suc: 0 0% 100%;
            --wa: 43 96% 50%; --wac: 0 0% 20%;
            --in: 212 96% 54%; --inc: 0 0% 100%;
            --rounded-box: 0.75rem; --rounded-btn: 0.5rem; --btn-text-case: none;
        }
        .htmx-request .htmx-indicator { display: inline-flex !important; }
        .htmx-indicator { display: none; }
    </style>
</head>
<body class="min-h-screen bg-base-200 p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl font-bold">Database Manager</h1>
                <p class="text-base-content/60 text-sm">Manage Vortex databases</p>
            </div>
            <a href="/login" class="btn btn-ghost btn-sm">Back to Login</a>
        </div>

        <!-- Master Password -->
        <div class="card bg-base-100 shadow mb-6">
            <div class="card-body py-3">
                <div class="flex items-center gap-4">
                    <label class="label"><span class="label-text font-medium">Master Password</span></label>
                    <input type="password" id="master-password" name="master_password" class="input input-bordered input-sm flex-1" placeholder="Enter master password">
                    <button id="unlock-btn" type="button" class="btn btn-primary btn-sm">Unlock</button>
                </div>
            </div>
        </div>

        <!-- Messages -->
        <div id="db-messages"></div>

        <!-- Database List -->
        <div class="card bg-base-100 shadow mb-6">
            <div class="card-body">
                <h2 class="card-title text-lg mb-4">Databases</h2>
                <div id="db-list"
                     hx-post="/web/database/manager/list"
                     hx-trigger="reloadList from:body"
                     hx-include="#master-password"
                     hx-swap="innerHTML">
                    <div class="text-center py-4 text-base-content/50">Enter master password and click Unlock to view databases</div>
                </div>
            </div>
        </div>

        <!-- Create Database -->
        <div class="card bg-base-100 shadow mb-6">
            <div class="card-body">
                <h2 class="card-title text-lg mb-4">Create Database</h2>
                <form hx-post="/web/database/manager/create"
                      hx-target="#db-messages"
                      hx-swap="innerHTML"
                      hx-on::after-request="if(event.detail.successful) { htmx.trigger(document.body, 'reloadList') }">
                    <div class="flex flex-wrap gap-4 items-end">
                        <div class="form-control flex-1 min-w-[200px]">
                            <label class="label"><span class="label-text">Database Name</span></label>
                            <input type="text" name="name" class="input input-bordered input-sm" placeholder="vortex_production" required>
                        </div>
                        <div class="form-control">
                            <label class="label cursor-pointer gap-2">
                                <span class="label-text">Demo Data</span>
                                <input type="checkbox" name="demo_data" value="true" class="checkbox checkbox-sm">
                            </label>
                        </div>
                        <input type="hidden" name="master_password" class="mp-field">
                        <button type="submit" class="btn btn-primary btn-sm">
                            <span class="htmx-indicator loading loading-spinner loading-xs"></span>
                            Create
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Duplicate Database -->
        <div class="card bg-base-100 shadow mb-6">
            <div class="card-body">
                <h2 class="card-title text-lg mb-4">Duplicate Database</h2>
                <form hx-post="/web/database/manager/duplicate"
                      hx-target="#db-messages"
                      hx-swap="innerHTML"
                      hx-on::after-request="if(event.detail.successful) { htmx.trigger(document.body, 'reloadList') }">
                    <div class="flex flex-wrap gap-4 items-end">
                        <div class="form-control flex-1 min-w-[150px]">
                            <label class="label"><span class="label-text">Source Database</span></label>
                            <input type="text" name="source" class="input input-bordered input-sm" required>
                        </div>
                        <div class="form-control flex-1 min-w-[150px]">
                            <label class="label"><span class="label-text">New Database Name</span></label>
                            <input type="text" name="target" class="input input-bordered input-sm" required>
                        </div>
                        <input type="hidden" name="master_password" class="mp-field">
                        <button type="submit" class="btn btn-secondary btn-sm">
                            <span class="htmx-indicator loading loading-spinner loading-xs"></span>
                            Duplicate
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Restore Database -->
        <div class="card bg-base-100 shadow mb-6">
            <div class="card-body">
                <h2 class="card-title text-lg mb-4">Restore Database</h2>
                <form hx-post="/web/database/manager/restore"
                      hx-target="#db-messages"
                      hx-swap="innerHTML"
                      hx-encoding="multipart/form-data"
                      hx-on::after-request="if(event.detail.successful) { htmx.trigger(document.body, 'reloadList') }">
                    <div class="flex flex-wrap gap-4 items-end">
                        <div class="form-control flex-1 min-w-[150px]">
                            <label class="label"><span class="label-text">Database Name</span></label>
                            <input type="text" name="name" class="input input-bordered input-sm" required>
                        </div>
                        <div class="form-control flex-1 min-w-[150px]">
                            <label class="label"><span class="label-text">Backup File (.zip)</span></label>
                            <input type="file" name="backup_file" class="file-input file-input-bordered file-input-sm" accept=".zip" required>
                        </div>
                        <input type="hidden" name="master_password" class="mp-field">
                        <button type="submit" class="btn btn-accent btn-sm">
                            <span class="htmx-indicator loading loading-spinner loading-xs"></span>
                            Restore
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Change Master Password -->
        <div class="card bg-base-100 shadow">
            <div class="card-body">
                <h2 class="card-title text-lg mb-4">Change Master Password</h2>
                <form hx-post="/web/database/manager/change-password"
                      hx-target="#db-messages"
                      hx-swap="innerHTML">
                    <div class="flex flex-wrap gap-4 items-end">
                        <div class="form-control flex-1 min-w-[150px]">
                            <label class="label"><span class="label-text">Current Password</span></label>
                            <input type="password" name="master_password" class="input input-bordered input-sm" required>
                        </div>
                        <div class="form-control flex-1 min-w-[150px]">
                            <label class="label"><span class="label-text">New Password</span></label>
                            <input type="password" name="new_password" class="input input-bordered input-sm" required>
                        </div>
                        <button type="submit" class="btn btn-warning btn-sm">Change Password</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Sync master password to all hidden fields
        document.getElementById('master-password').addEventListener('input', function() {
            document.querySelectorAll('.mp-field').forEach(el => el.value = this.value);
        });
        // Also set on form submit via htmx
        document.body.addEventListener('htmx:configRequest', function(evt) {
            const mpInput = document.getElementById('master-password');
            if (mpInput && !evt.detail.parameters.master_password) {
                evt.detail.parameters.master_password = mpInput.value;
            }
        });
        // Unlock button triggers the list reload
        function unlockDbList() {
            const mp = document.getElementById('master-password').value;
            if (!mp) {
                document.getElementById('db-messages').innerHTML =
                    '<div class="alert alert-warning mb-2"><span>Please enter master password</span></div>';
                return;
            }
            document.querySelectorAll('.mp-field').forEach(el => el.value = mp);
            htmx.trigger(document.body, 'reloadList');
        }
        document.getElementById('unlock-btn').addEventListener('click', unlockDbList);
        // Enter key in password field also triggers unlock
        document.getElementById('master-password').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                unlockDbList();
            }
        });
    </script>
</body>
</html>
