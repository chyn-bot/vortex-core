<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t)})()</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Remicle</title>
    <link href="/static/vendor/daisyui.min.css" rel="stylesheet">
    <link href="/static/vortex.css?v=18" rel="stylesheet">
    <script src="/static/vortex.js?v=18" defer></script>
    <script src="/static/vendor/tailwind.js"></script>
    <script src="/static/vendor/htmx.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'remicle': {
                            'green': '#8BC53F',
                            'green-dark': '#6BA32E',
                            'gray': '#6D6E71',
                            'gray-light': '#9D9FA2',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .htmx-request .htmx-indicator { display: inline-flex !important; }
        .htmx-indicator { display: none; }
    </style>
</head>
<body class="min-h-screen bg-base-200 flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="card bg-base-100 shadow-2xl">
            <div class="card-body">
                <!-- Logo -->
                <div class="text-center mb-6">
                    <div class="flex justify-center mb-4">
                        <img src="/static/images/remiclelogo.png" alt="Remicle" class="h-12">
                    </div>
                    <p class="text-base-content/60 text-sm">Zero-Trust Enterprise Core</p>
                </div>

                <!-- Error message -->
                <div id="login-error"></div>

                <!-- Login Form -->
                <form hx-post="/auth/login"
                      hx-target="#login-error"
                      hx-swap="innerHTML">

                    <div class="form-control mb-4">
                        <label class="label">
                            <span class="label-text">Username</span>
                        </label>
                        <input type="text" name="username" placeholder="Username"
                               class="input input-bordered" required autofocus>
                    </div>

                    <div class="form-control mb-6">
                        <label class="label">
                            <span class="label-text">Password</span>
                        </label>
                        <input type="password" name="password" placeholder="Password"
                               class="input input-bordered" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-full">
                        <span class="htmx-indicator loading loading-spinner loading-sm"></span>
                        Sign In
                    </button>
                </form>

                <!-- Footer -->
                <div class="mt-4 text-center text-xs text-base-content/50">
                    <p>Session timeout: 30 minutes</p>
                    <p>All access is logged for audit</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
