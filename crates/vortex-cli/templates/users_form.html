<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t)})()</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{form_title}} - Remicle</title>
    <link href="/static/vendor/daisyui.min.css" rel="stylesheet">
    <link href="/static/vortex.css?v=18" rel="stylesheet">
    <script src="/static/vortex.js?v=18" defer></script>
    <script src="/static/vendor/tailwind.js"></script>
    <script src="/static/vendor/htmx.min.js"></script>
    <style>
    </style>
</head>
<body class="min-h-screen bg-base-200">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-base-100 shadow-lg flex flex-col">
            <div class="p-4 border-b border-base-300">
                <a href="/dashboard" class="flex justify-center">
                    <img src="/static/images/remiclelogo.png" alt="Remicle" class="h-7">
                </a>
            </div>

            <nav class="flex-1 overflow-y-auto p-4">
                <ul class="menu menu-sm gap-1">
                    <li>
                        <a href="/dashboard">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                            </svg>
                            Dashboard
                        </a>
                    </li>
                    <li class="menu-title mt-4"><span>Records</span></li>
                    <li>
                        <a href="/users" class="active">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197m9 5.197v-1"/>
                            </svg>
                            Users
                        </a>
                    </li>
                    <li><a href="#"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>Companies</a></li>
                    <li><a href="#"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>Roles</a></li>
                    <li class="menu-title mt-4"><span>System</span></li>
                    <li><a href="#"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>Audit Log</a></li>
                </ul>
            </nav>

            <div class="p-4 border-t border-base-300 text-xs text-base-content/60">
                <p>Zero-Trust Enterprise Core</p>
                <p class="mt-1">v0.1.0</p>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Navbar -->
            <header class="bg-base-100 shadow-sm border-b border-base-300">
                <div class="navbar px-4">
                    <div class="flex-1">
                        <h1 class="text-lg font-semibold">{{form_title}}</h1>
                    </div>
                    <div class="flex-none gap-2">
                        <div class="dropdown dropdown-end">
                            <label tabindex="0" class="btn btn-ghost btn-circle avatar placeholder">
                                <div class="bg-primary text-primary-content rounded-full w-10">
                                    <span>{{user_initials}}</span>
                                </div>
                            </label>
                            <ul tabindex="0" class="dropdown-content z-[1] menu p-2 shadow bg-base-100 rounded-box w-52">
                                <li class="menu-title"><span>{{user_name}}</span></li>
                                <li><a href="#">Profile</a></li>
                                <li><a hx-post="/auth/logout" class="text-error">Logout</a></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Page Content -->
            <main class="flex-1 overflow-y-auto p-6">
                <div class="max-w-2xl mx-auto">
                    <div class="mb-6">
                        <a href="/users" class="btn btn-ghost btn-sm gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                            </svg>
                            Back to Users
                        </a>
                    </div>

                    <div class="card bg-base-100 shadow">
                        <div class="card-body">
                            <h2 class="card-title">{{form_title}}</h2>

                            <!-- Error message -->
                            <div id="form-error"></div>

                            <form action="{{form_action}}" method="POST" class="space-y-4">

                                <div class="form-control">
                                    <label class="label">
                                        <span class="label-text">Username *</span>
                                    </label>
                                    <input type="text" name="username" value="{{username}}"
                                           class="input input-bordered" required
                                           pattern="[a-zA-Z0-9_]+" minlength="3" maxlength="50"
                                           {{username_readonly}}
                                           placeholder="Enter username">
                                    <label class="label">
                                        <span class="label-text-alt">Letters, numbers, and underscores only</span>
                                    </label>
                                </div>

                                <div class="form-control">
                                    <label class="label">
                                        <span class="label-text">Email *</span>
                                    </label>
                                    <input type="email" name="email" value="{{email}}"
                                           class="input input-bordered" required
                                           placeholder="user@example.com">
                                </div>

                                <div class="form-control">
                                    <label class="label">
                                        <span class="label-text">Full Name</span>
                                    </label>
                                    <input type="text" name="full_name" value="{{full_name}}"
                                           class="input input-bordered"
                                           placeholder="John Doe">
                                </div>

                                {{password_section}}

                                {{status_section}}

                                <!-- Roles Section -->
                                <div class="form-control">
                                    <label class="label">
                                        <span class="label-text font-medium">Roles *</span>
                                    </label>
                                    {{roles_checkboxes}}
                                    <label class="label">
                                        <span class="label-text-alt">Select one or more roles — a user may hold several (e.g. System Administrator and Report Author)</span>
                                    </label>
                                </div>

                                <div class="divider"></div>

                                <div class="flex justify-end gap-2">
                                    <a href="/users" class="btn btn-ghost">Cancel</a>
                                    <button type="submit" class="btn btn-primary">{{submit_text}}</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
