<header class="bg-base-100 shadow-sm border-b border-base-300">
    <div class="navbar px-4">
        <!-- Left side - breadcrumb -->
        <div class="flex-1">
            <div class="text-sm breadcrumbs">
                <ul>
                    <li><a href="/dashboard">Home</a></li>
                    {% block breadcrumbs %}{% endblock %}
                </ul>
            </div>
        </div>

        <!-- Right side - actions -->
        <div class="flex-none gap-2">
            <!-- Search -->
            <div class="form-control hidden md:block">
                <div class="input-group input-group-sm">
                    <input type="text"
                           placeholder="Search..."
                           class="input input-bordered input-sm w-64"
                           hx-get="/search"
                           hx-trigger="keyup changed delay:300ms"
                           hx-target="#search-results"
                           name="q">
                </div>
            </div>

            <!-- Notifications -->
            <div class="dropdown dropdown-end">
                <label tabindex="0" class="btn btn-ghost btn-circle">
                    <div class="indicator">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                        </svg>
                        <span class="badge badge-xs badge-primary indicator-item" id="notification-count">0</span>
                    </div>
                </label>
                <div tabindex="0" class="dropdown-content z-[1] card card-compact w-80 p-2 shadow bg-base-100">
                    <div class="card-body">
                        <h3 class="font-bold">Notifications</h3>
                        <div id="notifications-list" class="text-sm text-base-content/70">
                            No new notifications
                        </div>
                    </div>
                </div>
            </div>

            <!-- User menu -->
            <div class="dropdown dropdown-end">
                <label tabindex="0" class="btn btn-ghost btn-circle avatar placeholder">
                    <div class="bg-primary text-primary-content rounded-full w-10">
                        <span class="text-sm">{{ user_initials }}</span>
                    </div>
                </label>
                <ul tabindex="0" class="dropdown-content z-[1] menu p-2 shadow bg-base-100 rounded-box w-52">
                    <li class="menu-title">
                        <span>{{ user_name }}</span>
                    </li>
                    <li><a href="/profile">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                        </svg>
                        Profile
                    </a></li>
                    <li><a href="/settings">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                        </svg>
                        Settings
                    </a></li>
                    <div class="divider my-0"></div>
                    <li>
                        <a hx-post="/auth/logout" hx-swap="none" class="text-error">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                            </svg>
                            Logout
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</header>
