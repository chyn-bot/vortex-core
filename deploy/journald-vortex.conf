# Vortex local log retention / rotation.
#
# The Vortex server logs to stdout, which systemd routes to the journal. This
# drop-in caps and rotates that local journal so a busy deployment can't fill
# the disk, satisfying the local-retention control (~4 GB).
#
# Install:
#   sudo cp deploy/journald-vortex.conf /etc/systemd/journald.conf.d/vortex.conf
#   sudo systemctl restart systemd-journald
#
# NOTE: this bounds the local operational/diagnostic log only. The WORM audit
# ledger is NOT rotated here — it is immutable by design and retained in
# Postgres, then exported to the SIEM and archived off-box (see
# docs/AUDIT_RETENTION.md).
[Journal]
# Cap total journal storage; oldest entries are rotated out past this.
SystemMaxUse=4G
# Cap any single journal file so rotation is incremental, not one big drop.
SystemMaxFileSize=256M
# Bound how long entries are kept regardless of size.
MaxRetentionSec=90day
# Persist across reboots so audit-adjacent operational history survives.
Storage=persistent
