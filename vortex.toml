# Vortex Configuration File

[server]
host = "0.0.0.0"
port = 3000
workers = 4

[database]
url = "postgres://vortex:vortex@localhost:5432/vortex"
min_connections = 5
# Global connection budget: the sum of ALL pools the server opens
# (primary + master + one per active tenant) never exceeds this.
# Keep it below the Postgres server's own max_connections (default
# 100) or tenant pools will be granted connections Postgres refuses.
max_connections = 90
ssl_mode = "prefer"

[security]
# JWT secret for token signing (generate a secure random value in production)
jwt_secret = "change-me-in-production"
jwt_expiry_hours = 24

# Session settings (zero-trust defaults)
session_idle_timeout_minutes = 30
session_absolute_timeout_hours = 24
max_concurrent_sessions = 3

# Password policy (zero-trust defaults)
password_min_length = 8
password_require_uppercase = true
password_require_lowercase = true
password_require_numbers = true
password_require_special = true
password_expiry_days = 365
password_history_count = 24
max_failed_attempts = 5
lockout_duration_minutes = 30

[audit]
# Audit log settings (immutable, append-only)
enabled = true
log_security_events = true
log_data_changes = true
retention_days = 90

[audit.signing]
# Which backend produces Ed25519 signatures over audit entries.
#
#   "env"    — Dev default. Loads the key from
#              $VORTEX_AUDIT_SIGNING_KEY (base64 PKCS#8). Private key
#              lives in the Vortex process heap. Not acceptable for
#              regulated deployments.
#
#   "pkcs11" — Production path. Delegates signing to an HSM via the
#              PKCS#11 v3.0 standard API. The private key material
#              NEVER enters the Vortex process — sign operations
#              happen inside the HSM and only the signature bytes
#              come back. Works with SoftHSM2 (dev/CI, not FIPS
#              validated), YubiHSM 2, Thales Luna, Entrust nShield,
#              Utimaco CryptoServer, and any other PKCS#11 device.
backend = "env"

# ── PKCS#11 backend configuration ──
#
# Uncomment and fill in when `backend = "pkcs11"`. The example values
# below are SoftHSM2 defaults suitable for local development and CI.
# For a real HSM, change `library_path` to the vendor's PKCS#11 shared
# library; everything else stays shape-compatible.
#
# [audit.signing.pkcs11]
# # Filesystem path to the PKCS#11 library .so/.dll.
# # SoftHSM2 (Ubuntu):        /usr/lib/softhsm/libsofthsm2.so
# # SoftHSM2 (RHEL/Fedora):   /usr/lib64/pkcs11/libsofthsm2.so
# # Thales Luna:              /usr/safenet/lunaclient/lib/libCryptoki2_64.so
# # Entrust nShield:          /opt/nfast/toolkits/pkcs11/libcknfast.so
# # YubiHSM 2:                /usr/lib/pkcs11/yubihsm_pkcs11.so
# library_path = "/usr/lib/softhsm/libsofthsm2.so"
#
# # Preferred: find the token by label (stable across reboots).
# token_label = "vortex"
#
# # Fallback: numeric slot index. Used only if `token_label` is unset.
# # Fragile — slots can renumber on USB replug / HSM restart.
# # slot = 0
#
# # Label of the private-key object inside the token. Must already
# # exist — Vortex does NOT auto-generate keys. Create the keypair
# # via the HSM vendor's key ceremony procedure before first start.
# key_label = "vortex-audit"
#
# # Environment variable holding the User PIN. Never put the PIN in
# # vortex.toml itself — inject via systemd Environment=, docker
# # --env-file, or a secrets manager.
# pin_env = "VORTEX_HSM_PIN"

[files]
# Attachment / binary storage backend: "local" or "s3".
#
# local — files under <path>/<tenant>/<key> on this server's disk.
#         Single-tier default; point path at an NFS mount to share
#         across app servers without changing backends.
# s3    — any S3-compatible object store (AWS S3, MinIO, Ceph, ...).
#         Required for multi-app-server deployments. Credentials come
#         from VORTEX_S3_ACCESS_KEY / VORTEX_S3_SECRET_KEY env vars,
#         never from this file.
backend = "local"

[files.local]
path = "uploads"

# [files.s3]
# endpoint = "http://minio.internal:9000"   # or https://s3.<region>.amazonaws.com
# region = "us-east-1"
# bucket = "vortex-files"
# path_style = true                          # true for MinIO; false for AWS virtual-hosted

[modules]
# Auto-install core modules
auto_install_core = true

[database_manager]
# Multi-database management (Odoo-style). Set enabled = true to activate.
enabled = true
master_database = "vortex_master"
# Master password — set via the VORTEX_MASTER_PASSWORD environment
# variable (argon2 hash, or plaintext for dev). Deployed installs put
# the hash in an EnvironmentFile (e.g. /etc/vortex/vortex.env, mode
# 600) referenced from the systemd unit. Never commit a value here.
master_password = ""
# Host-based tenant routing (regex over active database names).
# "" disables it: every host sees the full database picker.
# Placeholders: %h = first DNS label of the request Host header,
# %d = full host (port stripped); both are regex-escaped.
#   "^%h$"        gaia.vortex.com  → database "gaia"
#   "^vortex_%h$" gaia.vortex.com  → database "vortex_gaia"
# When set, a matching host locks login to the matched database and
# hides the picker; an unmatched public host falls back to the default
# database; localhost/127.0.0.1 keeps the full picker for ops access.
db_filter = ""
# Enforced naming prefix for new databases
db_name_prefix = "vortex_"

[logging]
level = "info"
format = "json"
file = "logs/vortex.log"
max_size_mb = 100
max_files = 10
